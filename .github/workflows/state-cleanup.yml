name: "Terraform State Cleanup"

on:
  workflow_dispatch:

# CRITICAL: These permissions are required for requesting the JWT OIDC token
permissions:
  id-token: write
  contents: read

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # Replace with your actual IAM Role ARN
          role-to-assume: arn:aws:iam::622778846520:role/ArgoCD-Hub-Provisioner
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Remove Ghost Resources from State
        run: |
          terraform state rm helm_release.argocd || true
          terraform state rm kubernetes_secret.argocd_repo_credentials || true
          terraform state rm 'module.eks.aws_eks_cluster.this[0]' || true
          terraform state rm 'module.eks.module.eks_managed_node_group["mgmt"].aws_eks_node_group.this[0]' || true
